name: Scrape Beer Menu

on:
  schedule:
    - cron: '0 6 * * *'  
  workflow_dispatch:     

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run scrape
        env:
          UNTAPPD_VENUE_ID: ${{ secrets.UNTAPPD_VENUE_ID }}

      - name: Commit updated beer data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/scraped-beers.json
          git diff --staged --quiet || git commit -m "chore: update beer menu data"
          git push
